interval: 30  # seconds between each check round

# Hosts to monitor
hosts:
  - name: "RAS Sound"
    ip: "2.0.0.12"
  - name: "Motor A"
    ip: "10.0.97.104"
  - name: "Motor B"
    ip: "10.0.97.109"
  - name: "Artnet Crayere 1"
    ip: "2.169.10.82"
  - name: "Artnet Crayere 2"
    ip: "2.169.10.83"
  - name: "Relay Motor"
    ip: "10.0.97.107"
  - name: "Relay Crayere"
    ip: "10.0.97.111"
# ntfy.sh notification settings
ntfy:
  topic: "ruinart-mon-tco5v"  # pick a unique/private name
  server: "https://ntfy.sh"

# Ping settings
ping:
  timeout_ms: 2000      # ms to wait for a reply
  failures_before_alert: 2   # consecutive failures before alerting (avoids false positives)
